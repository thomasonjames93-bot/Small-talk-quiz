<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Unit 3 Interactive Quiz – Small Talk</title>
  <style>
    :root {
      --navy: #003366;
      --border: #003366;
      --yellow: #ffd700;
      --green: #d7f5d7;
      --red: #ffd6d6;
      --text: #002b5c;
      --white: #ffffff;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      padding: 40px 0;
      font-family: Arial, Helvetica, sans-serif;
      color: var(--text);
      background: #ffffff;
      font-size: 18px;
      line-height: 1.4;
    }

    .page {
      width: min(72%, 960px);
      min-width: 760px;
      margin: 0 auto;
      padding: 36px 28px;
      border: 3px solid var(--border);
      border-radius: 8px;
    }

    h1 {
      margin: 0 0 22px;
      color: var(--navy);
      font-size: 26px;
      line-height: 1.25;
    }

    .instructions {
      margin-bottom: 32px;
      font-size: 22px;
      font-style: italic;
      color: var(--navy);
    }

    .instructions p {
      margin: 0 0 4px;
    }

    .question-card {
      margin: 0 0 28px;
      padding: 28px 22px 22px;
      border: 1.8px solid var(--border);
      border-radius: 6px;
      background: var(--white);
    }

    .question-title {
      margin: 0 0 22px;
      color: var(--navy);
      font-size: 22px;
      font-weight: 700;
    }

    .make-phrase {
      margin: 0 0 18px;
      color: var(--navy);
      font-size: 21px;
      font-weight: 700;
    }

    .make-phrase span {
      display: block;
      font-size: 21px;
      font-weight: 400;
    }

    .word-list {
      display: block;
      margin: 0 0 22px;
    }

    .word {
      width: 100%;
      margin: 0 0 10px;
      padding: 12px 14px;
      border: 1.7px solid var(--border);
      border-radius: 5px;
      color: #002b5c;
      background: #fff;
      font-size: 20px;
      text-align: left;
      cursor: pointer;
      transition: background 0.15s, transform 0.08s;
    }

    .word:hover,
    .word:focus {
      background: #eef5ff;
      outline: none;
    }

    .word:active {
      transform: scale(0.997);
    }

    .word.used {
      opacity: 0.35;
      cursor: not-allowed;
    }

    .answer-box {
      min-height: 52px;
      margin: 0 0 16px;
      padding: 10px 12px;
      border: 1.7px solid var(--border);
      border-radius: 5px;
      background: #ffffff;
      font-size: 20px;
      color: #002b5c;
    }

    .selected-word {
      display: inline-block;
      margin: 4px 6px 4px 0;
      padding: 6px 10px;
      border: 1px solid var(--border);
      border-radius: 4px;
      background: #eef5ff;
      cursor: pointer;
    }

    .button-row {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: center;
      margin-top: 8px;
    }

    button.action {
      padding: 12px 22px;
      border: none;
      border-radius: 6px;
      background: var(--yellow);
      color: var(--navy);
      font-size: 18px;
      font-weight: 700;
      cursor: pointer;
    }

    button.action:hover,
    button.action:focus {
      filter: brightness(0.96);
      outline: 2px solid transparent;
    }

    .feedback {
      margin-top: 18px;
      padding: 14px 16px;
      border-radius: 5px;
      font-size: 21px;
      display: none;
    }

    .feedback.correct {
      display: block;
      border: 1px solid #1f7a1f;
      background: var(--green);
      color: #075407;
    }

    .feedback.incorrect {
      display: block;
      border: 1px solid #b00000;
      background: var(--red);
      color: #7a0000;
    }

    .score-box {
      margin-top: 36px;
      padding: 24px;
      border: 2px solid var(--border);
      border-radius: 6px;
      color: var(--navy);
      font-size: 24px;
      font-weight: 700;
      display: none;
    }

    @media (max-width: 700px) {
      body {
        font-size: 18px;
      }

      .page {
        width: calc(100% - 20px);
        min-width: 0;
        margin: 0 auto;
        padding: 36px 18px;
      }

      h1 {
        font-size: 24px;
      }

      .instructions,
      .question-title,
      .make-phrase,
      .make-phrase span,
      .word,
      .answer-box {
        font-size: 20px;
      }

      .question-card {
        padding: 34px 14px 24px;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <h1>Unit 3 Interactive Quiz – Small Talk</h1>

    <section class="instructions" aria-label="Instructions">
      <p>Put the words in the correct order to make natural business small talk.</p>
      <p>単語を正しい順番に並べ替えて、自然なビジネススモールトークを作りましょう。</p>
    </section>

    <div id="quiz"></div>

    <div class="button-row">
      <button class="action" type="button" onclick="showScore()">Show Score / スコアを見る</button>
      <button class="action" type="button" onclick="resetQuiz()">Reset Quiz / もう一度</button>
    </div>

    <div id="score" class="score-box"></div>
  </main>

  <script>
    const questions = [
      {
        title: "1. Talking about the weather / 天気について話す",
        phrase: "Nice weather today, isn’t it?",
        japanese: "今日はいい天気ですね。",
        words: ["today,", "it?", "Nice", "isn’t", "weather"],
        answer: ["Nice", "weather", "today,", "isn’t", "it?"]
      },
      {
        title: "2. Asking about the weekend / 週末について聞く",
        phrase: "How was your weekend?",
        japanese: "週末はいかがでしたか。",
        words: ["weekend?", "your", "was", "How"],
        answer: ["How", "was", "your", "weekend?"]
      },
      {
        title: "3. Continuing the conversation / 会話を続ける",
        phrase: "Did you do anything interesting?",
        japanese: "何か面白いことをしましたか。",
        words: ["anything", "Did", "interesting?", "do", "you"],
        answer: ["Did", "you", "do", "anything", "interesting?"]
      },
      {
        title: "4. Talking about the journey / 移動について話す",
        phrase: "How was your trip here?",
        japanese: "ここまでの移動はいかがでしたか。",
        words: ["here?", "your", "trip", "was", "How"],
        answer: ["How", "was", "your", "trip", "here?"]
      },
      {
        title: "5. Asking about the place / 場所について聞く",
        phrase: "Is this your first time here?",
        japanese: "こちらは初めてですか。",
        words: ["time", "here?", "this", "first", "Is", "your"],
        answer: ["Is", "this", "your", "first", "time", "here?"]
      },
      {
        title: "6. Asking about work / 仕事について聞く",
        phrase: "Have you been busy recently?",
        japanese: "最近お忙しいですか。",
        words: ["busy", "you", "recently?", "been", "Have"],
        answer: ["Have", "you", "been", "busy", "recently?"]
      },
      {
        title: "7. Showing interest / 興味を示す",
        phrase: "That sounds interesting.",
        japanese: "それは面白そうですね。",
        words: ["interesting.", "That", "sounds"],
        answer: ["That", "sounds", "interesting."]
      },
      {
        title: "8. Asking about someone’s work / 相手の仕事について聞く",
        phrase: "What kind of work do you do?",
        japanese: "どのようなお仕事をされていますか。",
        words: ["work", "do", "kind", "you", "What", "of", "do?"],
        answer: ["What", "kind", "of", "work", "do", "you", "do?"]
      },
      {
        title: "9. Asking about experience / 経験について聞く",
        phrase: "How long have you worked here?",
        japanese: "こちらでどのくらい働いていますか。",
        words: ["worked", "long", "have", "here?", "How", "you"],
        answer: ["How", "long", "have", "you", "worked", "here?"]
      },
      {
        title: "10. Talking at an event / イベントで話す",
        phrase: "Do you come to these events often?",
        japanese: "このようなイベントにはよく参加されますか。",
        words: ["events", "to", "these", "come", "often?", "Do", "you"],
        answer: ["Do", "you", "come", "to", "these", "events", "often?"]
      }
    ];

    const quizEl = document.getElementById("quiz");
    const userAnswers = questions.map(() => []);
    const checked = questions.map(() => false);

    function renderQuiz() {
      quizEl.innerHTML = "";

      questions.forEach((q, questionIndex) => {
        const card = document.createElement("section");
        card.className = "question-card";

        const title = document.createElement("h2");
        title.className = "question-title";
        title.textContent = q.title;
        card.appendChild(title);

        const phrase = document.createElement("p");
        phrase.className = "make-phrase";
        phrase.innerHTML = `Make this phrase:<span>${q.japanese}</span>`;
        card.appendChild(phrase);

        const answerBox = document.createElement("div");
        answerBox.className = "answer-box";
        answerBox.id = `answer-${questionIndex}`;
        answerBox.setAttribute("aria-label", `Answer area for question ${questionIndex + 1}`);
        card.appendChild(answerBox);

        const wordList = document.createElement("div");
        wordList.className = "word-list";

        q.words.forEach((word, wordIndex) => {
          const wordButton = document.createElement("button");
          wordButton.className = "word";
          wordButton.type = "button";
          wordButton.textContent = word;
          wordButton.id = `word-${questionIndex}-${wordIndex}`;
          wordButton.onclick = () => chooseWord(questionIndex, wordIndex, word);
          wordList.appendChild(wordButton);
        });

        card.appendChild(wordList);

        const buttonRow = document.createElement("div");
        buttonRow.className = "button-row";

        const checkButton = document.createElement("button");
        checkButton.className = "action";
        checkButton.type = "button";
        checkButton.textContent = "Check Answer / 答え合わせ";
        checkButton.onclick = () => checkAnswer(questionIndex);
        buttonRow.appendChild(checkButton);

        const clearButton = document.createElement("button");
        clearButton.className = "action";
        clearButton.type = "button";
        clearButton.textContent = "Clear / クリア";
        clearButton.onclick = () => clearAnswer(questionIndex);
        buttonRow.appendChild(clearButton);

        card.appendChild(buttonRow);

        const feedback = document.createElement("div");
        feedback.className = "feedback";
        feedback.id = `feedback-${questionIndex}`;
        card.appendChild(feedback);

        quizEl.appendChild(card);
        updateAnswerBox(questionIndex);
      });
    }

    function chooseWord(questionIndex, wordIndex, word) {
      const button = document.getElementById(`word-${questionIndex}-${wordIndex}`);
      if (button.classList.contains("used")) return;

      userAnswers[questionIndex].push({ word, wordIndex });
      button.classList.add("used");
      button.disabled = true;
      checked[questionIndex] = false;
      clearFeedback(questionIndex);
      updateAnswerBox(questionIndex);
    }

    function updateAnswerBox(questionIndex) {
      const answerBox = document.getElementById(`answer-${questionIndex}`);
      answerBox.innerHTML = "";

      userAnswers[questionIndex].forEach((item, selectedIndex) => {
        const span = document.createElement("span");
        span.className = "selected-word";
        span.textContent = item.word;
        span.title = "Click to remove / クリックして削除";
        span.onclick = () => removeSelectedWord(questionIndex, selectedIndex);
        answerBox.appendChild(span);
      });
    }

    function removeSelectedWord(questionIndex, selectedIndex) {
      const removed = userAnswers[questionIndex].splice(selectedIndex, 1)[0];
      const button = document.getElementById(`word-${questionIndex}-${removed.wordIndex}`);
      button.classList.remove("used");
      button.disabled = false;
      checked[questionIndex] = false;
      clearFeedback(questionIndex);
      updateAnswerBox(questionIndex);
    }

    function checkAnswer(questionIndex) {
      const correctAnswer = questions[questionIndex].answer.join(" ");
      const userAnswer = userAnswers[questionIndex].map(item => item.word).join(" ");
      const feedback = document.getElementById(`feedback-${questionIndex}`);

      if (userAnswer === correctAnswer) {
        feedback.className = "feedback correct";
        feedback.textContent = "Correct! / 正解です！";
        checked[questionIndex] = true;
      } else {
        feedback.className = "feedback incorrect";
        feedback.textContent = `Try again. / もう一度やってみましょう。`;
        checked[questionIndex] = false;
      }
    }

    function clearFeedback(questionIndex) {
      const feedback = document.getElementById(`feedback-${questionIndex}`);
      feedback.className = "feedback";
      feedback.textContent = "";
    }

    function clearAnswer(questionIndex) {
      userAnswers[questionIndex] = [];
      questions[questionIndex].words.forEach((_, wordIndex) => {
        const button = document.getElementById(`word-${questionIndex}-${wordIndex}`);
        button.classList.remove("used");
        button.disabled = false;
      });
      checked[questionIndex] = false;
      clearFeedback(questionIndex);
      updateAnswerBox(questionIndex);
    }

    function showScore() {
      questions.forEach((_, index) => checkAnswer(index));
      const total = checked.filter(Boolean).length;
      const score = document.getElementById("score");
      score.style.display = "block";
      score.textContent = `Score: ${total} / ${questions.length}　スコア：${total} / ${questions.length}`;
      score.scrollIntoView({ behavior: "smooth", block: "center" });
    }

    function resetQuiz() {
      questions.forEach((_, index) => clearAnswer(index));
      const score = document.getElementById("score");
      score.style.display = "none";
      score.textContent = "";
      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    renderQuiz();
  </script>
</body>
</html>
